<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Content Detector</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; background: #f9f9f9; color: #333; }
    h1 { color: #2c3e50; }
    .container { max-width: 600px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    input[type="text"] { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
    button { background: #3498db; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #2980b9; }
    .result { margin-top: 20px; padding: 15px; background: #ecf0f1; border-radius: 6px; }
    .chart { height: 20px; background: #ddd; border-radius: 10px; overflow: hidden; margin-top: 10px; }
    .bar { height: 100%; background: #e74c3c; text-align: center; color: white; line-height: 20px; }
    #preview { margin-top: 20px; }
    #embedStatus { margin-top: 12px; font-size: 14px; }
    #embedStatus a { color: #3498db; font-weight: bold; text-decoration: none; }
    #embedStatus a:hover { text-decoration: underline; }
    blockquote.instagram-media { margin: auto; }
  </style>
</head>
<body>
  <div class="container">
    <h1>AI Content Detector</h1>
    <p>This website helps users detect whether Instagram Reels content is AI-generated or authentic. Paste the link to a Reel below and get an instant analysis.</p>
    
    <input type="text" id="videoInput" placeholder="Paste Instagram Reels URL here">
    <button onclick="detectAI()">Detect AI Content</button>
    
    <div id="preview"></div>
    
    <div id="output" class="result" style="display:none;">
      <h3>Detection Result</h3>
      <div class="chart">
        <div id="bar" class="bar" style="width:0%">0%</div>
      </div>
      <button onclick="downloadReport()">Download Report</button>
    </div>
  </div>

  <!-- Instagram embed script -->
  <script async src="https://www.instagram.com/embed.js"></script>

  <script>
    function getEmbedPermalink(rawUrl) {
      try {
        const trimmed = rawUrl.trim();
        if (!trimmed) return null;

        const normalizedInput = /^https?:\/\//i.test(trimmed) ? trimmed : `https://${trimmed}`;
        const parsed = new URL(normalizedInput);
        const host = parsed.hostname.toLowerCase();
        const isInstagramHost = host === "instagram.com" || host === "www.instagram.com" || host === "m.instagram.com";
        if (!isInstagramHost) return null;

        const path = parsed.pathname;
        const match = path.match(/^\/(reel|reels|p|tv)\/([^/?#]+)(?:\/.*)?$/i);
        if (!match) return null;

        const type = match[1].toLowerCase() === "reels" ? "reel" : match[1].toLowerCase();
        const shortcode = match[2];
        return `https://www.instagram.com/${type}/${shortcode}/`;
      } catch {
        return null;
      }
    }

    function processInstagramEmbedWithRetry(retries = 12, delayMs = 250) {
      if (window.instgrm?.Embeds?.process) {
        window.instgrm.Embeds.process();
        return;
      }

      if (retries > 0) {
        setTimeout(() => processInstagramEmbedWithRetry(retries - 1, delayMs), delayMs);
      }
    }

    function extractInstagramUrlFromCurrentLocation() {
      const href = window.location.href;

      const queryParams = new URLSearchParams(window.location.search);
      const queryIg = queryParams.get('ig') || queryParams.get('url') || queryParams.get('reel');
      if (queryIg) {
        return queryIg;
      }

      if (window.location.hash) {
        const hashText = window.location.hash.slice(1);
        const hashParams = new URLSearchParams(hashText);
        const hashIg = hashParams.get('ig') || hashParams.get('url') || hashParams.get('reel');
        if (hashIg) {
          return hashIg;
        }
      }

      const embeddedIgMatch = href.match(/https?:\/\/(?:www\.|m\.)?instagram\.com\/[\S]+/i);
      if (embeddedIgMatch) {
        return embeddedIgMatch[0];
      }

      return null;
    }

    function detectAI() {
      const url = document.getElementById('videoInput').value;
      const permalink = getEmbedPermalink(url);

      if (!permalink) {
        alert("Please paste a valid Instagram post/reel URL (e.g. https://www.instagram.com/reel/.../).");
        return;
      }

      // Show Instagram Reel preview using official embed
      document.getElementById('preview').innerHTML =
        `<blockquote class="instagram-media" 
            data-instgrm-permalink="${permalink}" 
            data-instgrm-version="14"></blockquote>
         <div id="embedStatus">Loading Instagram preview...<br><a href="${permalink}" target="_blank" rel="noopener noreferrer">Open this post on Instagram</a></div>`;

      processInstagramEmbedWithRetry();

      setTimeout(() => {
        const preview = document.getElementById('preview');
        const hasIframe = !!preview.querySelector('iframe');
        const status = document.getElementById('embedStatus');

        if (!status) return;

        if (hasIframe) {
          status.style.display = 'none';
        } else {
          status.innerHTML = `Instagram preview may be blocked on this host/browser.<br><a href="${permalink}" target="_blank" rel="noopener noreferrer">Open this post on Instagram</a>`;
        }
      }, 3000);

      // Dummy detection logic: random percentage
      const aiPercent = Math.floor(Math.random() * 100);
      const bar = document.getElementById('bar');
      bar.style.width = aiPercent + "%";
      bar.textContent = aiPercent + "% AI Content";

      document.getElementById('output').style.display = "block";
    }

    function downloadReport() {
      const barText = document.getElementById('bar').textContent;
      const report = "AI Content Detection Report\n\nResult: " + barText;
      
      const blob = new Blob([report], { type: "text/plain" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "AI_Detection_Report.txt";
      link.click();
    }

    document.addEventListener('DOMContentLoaded', () => {
      const autoUrl = extractInstagramUrlFromCurrentLocation();
      if (!autoUrl) return;

      const input = document.getElementById('videoInput');
      input.value = decodeURIComponent(autoUrl);

      const permalink = getEmbedPermalink(input.value);
      if (permalink) {
        detectAI();
      }
    });
  </script>
</body>
</html>
